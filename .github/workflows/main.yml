name: Bashar_RDP_Project

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Preparing Environment
        run: |
          echo "Setting up Python and RDP..."
          python --version
          
      - name: Connect Tailscale
        shell: powershell
        run: |
          # تحميل وتثبيت Tailscale
          iwr -useb https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe -OutFile tailscale-setup.exe
          Start-Process .\tailscale-setup.exe -ArgumentList '/quiet' -Wait
          
          # ربط المفتاح اللي بعته
          & 'C:\Program Files\Tailscale\tailscale.exe' up --authkey ${{ secrets.TAILSCALE_AUTH_KEY }}
          
      - name: Configure RDP User
        shell: powershell
        run: |
          # إعداد اليوزر والباسورد (نفس بتاع المرة اللي فاتت)
          $User = "Bashar"
          $Pass = ConvertTo-SecureString "Bashar@2026#Global" -AsPlainText -Force
          New-LocalUser -Name $User -Password $Pass -Description "RDP User"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member $User
          Add-LocalGroupMember -Group "Administrators" -Member $User
          
      - name: Keep Alive
        run: |
          echo "RDP is ready! Connect using your Tailscale IP."
          echo "User: Bashar | Pass: Bashar@2026#Global"
          # أمر عشان الـ Action ميفصلش
          sleep 21600
