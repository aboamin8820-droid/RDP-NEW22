name: Bashar_RDP_Project

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Connect Tailscale
        shell: powershell
        run: |
          iwr -useb https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe -OutFile tailscale-setup.exe
          Start-Process .\tailscale-setup.exe -ArgumentList '/quiet' -Wait
          & 'C:\Program Files\Tailscale\tailscale.exe' up --authkey ${{ secrets.TAILSCALE_AUTH_KEY }}
          
      - name: Configure RDP User
        shell: powershell
        run: |
          # الباسورد الجديد: Bashar2026 (قصير وقوي ومن غير رموز معقدة)
          $name = "Bashar"
          $pass = "Bashar2026"
          net user $name $pass /add /passwordchg:no
          net localgroup Administrators $name /add
          echo "User Bashar is ready with password Bashar2026"
          
      - name: Keep Alive
        run: |
          echo "Connect now using Tailscale IP"
          echo "User: Bashar | Pass: Bashar2026"
          sleep 21600
